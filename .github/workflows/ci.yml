name: CI

on:
  push:
    # Avoid duplicate builds on PRs.
    branches:
      - main
  pull_request:

jobs:
  check_publishable:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        # Most of the time this will be a no-op, since GitHub releases new images every week
        # which include the latest stable release of Rust, Rustup, Clippy and rustfmt.
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2
      - name: Check cargo publish
        run: cargo publish --dry-run

  lint:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        # Most of the time this will be a no-op, since GitHub releases new images every week
        # which include the latest stable release of Rust, Rustup, Clippy and rustfmt.
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2
      - name: Clippy
        # Using --all-targets so tests are checked and --deny to fail on warnings.
        # Not using --locked here and below since Cargo.lock is in .gitignore.
        run: cargo clippy --all-targets --all-features -- --deny warnings
      - name: rustfmt
        run: cargo fmt -- --check
      - name: Check docs
        # Using RUSTDOCFLAGS until `cargo doc --check` is stabilised:
        # https://github.com/rust-lang/cargo/issues/10025
        run: RUSTDOCFLAGS="-D warnings" cargo doc --all-features --document-private-items --no-deps

  unit-test:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2
      - name: Run unit tests
        run: cargo test --all-features

  msrv:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install MSRV toolchain
        # Pinned to the `rust-version` declared in Cargo.toml. Unlike the other
        # jobs (which `rustup update` to latest stable), this enforces the MSRV
        # and catches code that silently raises the floor.
        run: rustup toolchain install 1.83 --profile minimal
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2
      - name: Build and test on MSRV
        run: cargo +1.83 test --all-features

  readme-updated:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update Rust toolchain
        run: rustup update
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2
      - name: Install cargo readme
        run: |
          cargo install cargo-rdme
          cargo rdme install-rust-toolchain-for-intralinks
      - name: Check if README.md is up-to-date (see README.md for updating instructions)
        run: cargo rdme --check
